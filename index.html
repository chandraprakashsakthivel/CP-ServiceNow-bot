<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chandru's Bot</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #00c2ff;
    --accent2: #0077b6;
    --success: #00e5a0;
    --warning: #ffb347;
    --text: #e2eaf5;
    --text-muted: #7a9bbf;
    --user-bg: #0d2d4a;
    --bot-bg: #111e2f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,194,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,194,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(0,194,255,0.3);
  }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .header-info p {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 1px;
  }

  .status-pill {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--success);
    font-family: 'IBM Plex Mono', monospace;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Topic chips */
  .topic-bar {
    position: relative; z-index: 10;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,194,255,0.05);
  }

  /* Messages */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative; z-index: 1;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 820px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.bot .avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    box-shadow: 0 0 12px rgba(0,194,255,0.2);
  }

  .msg.user .avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.65;
    max-width: calc(100% - 44px);
  }

  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 2px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid rgba(0,119,182,0.4);
    border-top-right-radius: 2px;
    color: var(--text);
  }

  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble code {
    background: rgba(0,194,255,0.08);
    border: 1px solid rgba(0,194,255,0.15);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
  }

  .bubble ul { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }

  /* Tag badges in bot messages */
  .tag {
    display: inline-block;
    background: rgba(0,194,255,0.1);
    border: 1px solid rgba(0,194,255,0.25);
    color: var(--accent);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 5px;
    margin-bottom: 8px;
  }

  /* Typing indicator */
  .typing-bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 18px;
  }

  .typing-bubble span {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    opacity: 0.6;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  /* Input area */
  .input-area {
    position: relative; z-index: 10;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
  }

  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }

  #userInput::placeholder { color: var(--text-muted); }

  #sendBtn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 6px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #sendBtn:hover { transform: scale(1.05); box-shadow: 0 0 14px rgba(0,194,255,0.4); }
  #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #sendBtn svg { width: 16px; height: 16px; fill: white; }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 32px 20px;
    animation: fadeUp 0.5s ease;
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--accent), #7ed4f5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }

  .suggestions {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
  }

  .sug-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }

  .sug-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(0,194,255,0.05);
  }
</style>
</head>
<body>

<header>
  <div class="logo">⚙️</div>
  <div class="header-info">
    <h1>Chandru's Bot</h1>
    <p>INCIDENTS · PROBLEMS · CHANGES · SLA · CMDB</p>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    ONLINE
  </div>
</header>

<div class="topic-bar">
  <div class="chip" onclick="askChip('How do I create an incident?')">📋 Create Incident</div>
  <div class="chip" onclick="askChip('What is a problem record?')">🔴 Problem Mgmt</div>
  <div class="chip" onclick="askChip('How does change management work in ServiceNow?')">🔄 Change Mgmt</div>
  <div class="chip" onclick="askChip('Explain SLA in ServiceNow')">⏱ SLA</div>
  <div class="chip" onclick="askChip('What is the incident lifecycle?')">🔁 Incident Lifecycle</div>
  <div class="chip" onclick="askChip('What is CMDB?')">🗃 CMDB</div>
</div>

<div id="chat">
  <div class="welcome" id="welcome">
    <h2>Chandru's Bot</h2>
    <p>Ask me anything about Incidents, Problems, Changes, SLAs, and more.</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="askChip('How do I prioritize an incident?')">How do I prioritize an incident?</button>
      <button class="sug-btn" onclick="askChip('What is the difference between incident and problem?')">Incident vs Problem?</button>
      <button class="sug-btn" onclick="askChip('How to submit a change request?')">How to submit a change request?</button>
      <button class="sug-btn" onclick="askChip('What are change types in ServiceNow?')">What are change types?</button>
      <button class="sug-btn" onclick="askChip('How does escalation work in ServiceNow?')">How does escalation work?</button>
      <button class="sug-btn" onclick="askChip('What is a known error in problem management?')">What is a known error?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Ask about Incidents, Problems, Changes, SLAs..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="hint">Chandru's Bot · Powered by Claude AI · ServiceNow ITSM</div>
</div>

<script>
const SYSTEM_PROMPT = `You are a ServiceNow ITSM Expert Assistant. You ONLY answer questions related to ServiceNow IT Service Management (ITSM), specifically:

- **Incident Management**: Creating, prioritizing, assigning, escalating, resolving incidents, SLA, states, categories
- **Problem Management**: Problem records, root cause analysis, known errors, workarounds, problem lifecycle
- **Change Management**: Change requests, types (Standard, Normal, Emergency), CAB, change lifecycle, approvals, risk assessment
- **SLA & OLA**: Service Level Agreements, Operational Level Agreements, breach, pause, reset
- **CMDB**: Configuration items, relationships, discovery
- **Service Catalog**: Request items, catalog tasks
- **ServiceNow Workflow & Roles**: Assignment groups, resolver groups, approvers, ITIL roles

Response Style:
- Be concise, practical, and structured
- Use bullet points when listing steps or options
- Bold key ServiceNow terms
- If asked something unrelated to ServiceNow ITSM, politely redirect: "I'm specialized in ServiceNow ITSM only. Please ask about Incidents, Problems, Changes, or related topics."
- Keep responses focused and professional`;

let history = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function askChip(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function renderText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code>$1</code>')
    .replace(/\n- /g, '\n• ')
    .replace(/•\s(.+)/g, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n/g, '<br>');
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  // Show typing
  const typingId = showTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch('https://chandru-proxy.cpspj11.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping(typingId);

    const reply = data.content?.[0]?.text || 'Sorry, I could not get a response.';
    appendMsg('bot', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping(typingId);
    appendMsg('bot', 'Connection error. Please try again.');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function appendMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'bot' ? '⚙️' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderText(text);

  div.appendChild(avatar);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = id;
  div.innerHTML = `
    <div class="avatar">⚙️</div>
    <div class="bubble typing-bubble"><span></span><span></span><span></span></div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}
</script>
</body>
</html>
